# Process new cards
#
# Single pipeline that runs whenever cards/ changes on main:
#   Job 1 (generate-images): for each card missing image_path, call OpenAI,
#                            save the PNG, write image_path back into the JSON,
#                            commit directly to main with [skip ci].
#   Job 2 (render-cards):    after Job 1 completes, check out the now-updated main,
#                            render any status:"draft" cards onto midway.html,
#                            flip their status to "published",
#                            open a PR for editorial review.
#
# Sequencing the two jobs (instead of running them as separate parallel workflows)
# eliminates the race that previously caused a status-field merge conflict on
# every card save and prevented image_path from reaching midway.html at render time.

name: Process new cards

on:
  push:
    branches: [main]
    paths:
      - 'cards/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: process-cards
  cancel-in-progress: false

jobs:
  generate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find cards missing image_path
        id: scan
        run: |
          cd cards
          missing=$(grep -L 'image_path' 2026-*.json || true)
          if [ -z "$missing" ]; then
            echo "no_work=true" >> $GITHUB_OUTPUT
            echo "All cards already have image_path. Nothing to generate."
          else
            echo "no_work=false" >> $GITHUB_OUTPUT
            echo "Cards missing image_path:"
            echo "$missing"
            {
              echo "missing<<EOF"
              echo "$missing"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.scan.outputs.no_work == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.scan.outputs.no_work == 'false'
        run: pip install openai pillow

      - name: Generate images
        if: steps.scan.outputs.no_work == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd cards
          echo "${{ steps.scan.outputs.missing }}" | xargs -n1 -P 3 python generate_card_image.py

      - name: Commit and push generated images
        if: steps.scan.outputs.no_work == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/images/ cards/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-generate card images [skip ci]"
            # save-card.js can push directly to main while this run is in
            # flight; that makes the local push non-fast-forward. Rebase
            # our additive image commit and retry. The commits we'd race
            # against are new card files at unique paths, so the rebase
            # is conflict-free.
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                echo "Push succeeded on attempt $attempt."
                exit 0
              fi
              echo "Push attempt $attempt failed; retrying after backoff..."
              sleep 5
            done
            echo "Push failed after 3 attempts."
            exit 1
          fi

  render-cards:
    needs: generate-images
    runs-on: ubuntu-latest
    steps:
      # Check out main explicitly (not the SHA that triggered the workflow) so
      # this job sees any image_path commits that generate-images just pushed.
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run render script
        run: node scripts/render-cards.js

      - name: Open pull request with rendered changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Render draft cards onto midway.html"
          branch: auto-publish/render-draft-cards
          delete-branch: true
          title: "Render draft cards onto midway.html"
          body: |
            Auto-generated by the process-cards workflow.

            ## Changes in this PR
            - Rendered card HTML inserted into the appropriate sub-tent sections on `midway.html`
            - Card JSON files updated from `status: draft` to `status: published`

            ## Before merging
            1. Click the Netlify deploy preview link below
            2. Visually verify cards appear in the right sections with correct styling
            3. Merge if it looks right; close the PR if it does not
