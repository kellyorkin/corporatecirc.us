# Render draft cards onto midway.html
#
# Triggers:
#   - On push to main when cards/ changes (e.g., a new card is saved)
#   - On manual dispatch from the Actions tab
#
# What it does:
#   1. Checks out the repo
#   2. Runs scripts/render-cards.js, which:
#      - Finds all cards/*.json with status: "draft"
#      - Renders them as HTML and inserts into the right midway.html section
#      - Flips each card's status to "published"
#   3. Opens a PR with the changes (peter-evans/create-pull-request)
#
# Approval flow:
#   - You review the PR (visual check via Netlify deploy preview)
#   - You merge when satisfied
#   - Netlify auto-deploys the merged changes to corporatecirc.us

name: Render draft cards

on:
  push:
    branches:
      - main
    paths:
      - 'cards/**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run render script
        run: node scripts/render-cards.js

      - name: Open pull request with rendered changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Render draft cards onto midway.html"
          branch: auto-publish/render-draft-cards
          delete-branch: true
          title: "Render draft cards onto midway.html"
          body: |
            Auto-generated by the render-cards workflow.

            ## Changes in this PR
            - Rendered card HTML inserted into the appropriate sub-tent sections on `midway.html`
            - Card JSON files updated from `status: draft` to `status: published`

            ## Before merging
            1. Click the Netlify deploy preview link below
            2. Visually verify cards appear in the right sections with correct styling
            3. Merge if it looks right; close the PR if it does not
