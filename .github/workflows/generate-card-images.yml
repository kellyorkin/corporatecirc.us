name: Generate card images

on:
  push:
    branches: [main]
    paths:
      - 'cards/*.json'
  workflow_dispatch:  # manual trigger for backfills or recovery

permissions:
  contents: write

concurrency:
  group: card-image-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find cards missing image_path
        id: scan
        run: |
          cd cards
          missing=$(grep -L 'image_path' 2026-*.json || true)
          if [ -z "$missing" ]; then
            echo "no_work=true" >> $GITHUB_OUTPUT
            echo "All cards already have image_path. Nothing to generate."
          else
            echo "no_work=false" >> $GITHUB_OUTPUT
            echo "Cards missing image_path:"
            echo "$missing"
            {
              echo "missing<<EOF"
              echo "$missing"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.scan.outputs.no_work == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.scan.outputs.no_work == 'false'
        run: pip install openai pillow

      - name: Generate images
        if: steps.scan.outputs.no_work == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd cards
          echo "${{ steps.scan.outputs.missing }}" | xargs -n1 -P 3 python generate_card_image.py

      - name: Commit and push generated images
        if: steps.scan.outputs.no_work == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/images/ cards/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-generate card images [skip ci]"
            git push
          fi
